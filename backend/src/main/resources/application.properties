spring.application.name=agriconnect
server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/agriconnect}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,classpath:db/specific/dev
# ==========================================
# JWT SECURITY CONFIGURATION
# ==========================================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}

# ==========================================
# AI INSIGHT CONFIGURATION
# ==========================================
ai.enabled=${AI_ENABLED:false}
ai.provider=${AI_PROVIDER:mock}
ai.api-key=${AI_API_KEY:}
ai.model=${AI_MODEL:gpt-4o-mini}
ai.timeout-ms=${AI_TIMEOUT_MS:10000}
ai.max-input-rows=${AI_MAX_INPUT_ROWS:8}
ai.fallback-on-error=${AI_FALLBACK_ON_ERROR:true}
ai.forecast-service-url=${AI_FORECAST_SERVICE_URL:http://localhost:8001}

# Comma-separated browser origins allowed to call the API.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}
