services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agriconnect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agriconnect"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/agriconnect
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      AI_FORECAST_SERVICE_URL: http://ai:8001
    ports:
      - "8080:8080"
    volumes:
      - ./ai/data:/ai/data:ro
    depends_on:
      postgres:
        condition: service_healthy
      ai:
        condition: service_healthy
    restart: unless-stopped

  ai:
    build:
      context: ./ai
    ports:
      - "8001:8001"
    volumes:
      - ./ai/data:/app/data
      - ./ai/models:/app/models
      - ./ai/output:/app/output
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
    environment:
      HOST: 0.0.0.0
      PORT: 5173
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
